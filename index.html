<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4b6b3c">
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<title>Tapestry Acres — Meet the Herd</title>
<style>
  :root{
    --cream:#f7f4ec; --ink:#33301f; --muted:#6f6a55;
    --forest:#4b6b3c; --meadow:#6b8e4e; --earth:#8a6a44;
    --lake:#3f7fa6; --plum:#7b5d77; --accent:#c0492f;
    --gold:#e0a23c; --lantern:#f4c873; --night:#1d2436;
    --card:#fbf6e9; --cardborder:#e6d9b3; --line:#e3ddcd;
    --rare:#3f7fa6; --legendary:#b8923a; --common:#6b8e4e;
    --serif:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    --sans:Arial,'Helvetica Neue',system-ui,sans-serif;
    --ok:#3c7a4e; --warn:#e0a23c; --shadow:0 1px 2px rgba(60,45,20,.05),0 8px 24px -16px rgba(60,45,20,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.5;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
    padding:0 14px calc(84px + env(safe-area-inset-bottom)) 14px;}
  .wrap{max-width:640px;margin:0 auto;}
  a{color:var(--forest)}

  /* ---- header ---- */
  header{padding:calc(16px + env(safe-area-inset-top)) 2px 4px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand h1{font-family:var(--serif);font-size:24px;font-weight:700;margin:0;letter-spacing:-.01em;}
  .brand .leaf{font-size:24px;}
  .sub{font-size:13px;color:var(--muted);margin:2px 0 0;}

  /* ---- tab bar (bottom, app-like) ---- */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;
    display:flex;gap:2px;padding:6px 8px calc(6px + env(safe-area-inset-bottom));
    background:rgba(247,244,236,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);}
  .tabbar button{flex:1;min-width:0;font:inherit;font-size:11px;font-weight:700;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 2px;border:0;border-radius:12px;background:transparent;color:var(--muted);cursor:pointer;
    transition:color .15s,background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .tabbar button .ic{font-size:19px;line-height:1;}
  .tabbar button.on{color:var(--forest);background:rgba(75,107,60,.1);}
  .tabbar button .cnt{font-size:10px;font-weight:800;color:#fff;background:var(--accent);
    border-radius:999px;padding:0 5px;min-width:16px;line-height:15px;position:absolute;transform:translate(14px,-8px);}
  .tabbar button{position:relative;}

  /* ---- buttons (journey-site parity) ---- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:999px;
    padding:13px 20px;font:inherit;font-size:15px;font-weight:700;text-decoration:none;
    background:var(--forest);color:#fff;cursor:pointer;transition:transform .12s ease,filter .12s ease;}
  .btn:hover{transform:translateY(-2px);filter:brightness(1.07)}
  .btn:active{transform:translateY(0)}
  .btn.accent{background:var(--accent)}
  .btn.gold{background:var(--legendary);color:#2c2410}
  .btn.ghost{background:rgba(255,255,255,.7);color:var(--ink);border:1px solid var(--cardborder)}
  .btn.added{background:#7d8a6a;pointer-events:none}
  .btn.block{width:100%}
  .btnrow{display:flex;flex-wrap:wrap;gap:10px}
  .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 13px;font-size:13px;
    font-weight:700;border:1px solid var(--cardborder);background:var(--card);color:var(--ink);cursor:pointer;white-space:nowrap;}
  .pill.on{background:var(--forest);color:#fff;border-color:var(--forest);}

  /* ---- cards ---- */
  .card{background:var(--card);border:1px solid var(--cardborder);border-radius:18px;padding:16px;box-shadow:var(--shadow);}
  .badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.02em;padding:3px 8px;border-radius:7px;color:#fff;vertical-align:middle;}

  /* ---- herd grid (tcard vocab) ---- */
  .tools{display:flex;flex-direction:column;gap:10px;margin:14px 0 10px;}
  .search{width:100%;padding:12px 14px;border:1px solid var(--cardborder);border-radius:12px;background:var(--card);color:var(--ink);font:inherit;font-size:15px;}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;}
  .count{font-size:12px;color:var(--muted);margin:0 2px 10px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  @media(min-width:520px){.grid{grid-template-columns:1fr 1fr 1fr;}}
  .tcard{background:var(--card);border:1px solid var(--cardborder);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
  .tcard .ph{aspect-ratio:4/5;background:linear-gradient(135deg,#efe9d6,#e3dcc4);display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;}
  .tcard .ph img{width:100%;height:100%;object-fit:cover;}
  .tcard.soon .ph::after{content:"📷 soon";position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#fff;background:rgba(45,35,20,.6);padding:3px 9px;border-radius:999px;}
  .pcount{position:absolute;right:7px;bottom:7px;font-size:10.5px;font-weight:700;background:rgba(45,35,20,.62);color:#fff;padding:2px 8px;border-radius:999px;}
  .tcard .b{padding:10px 12px 12px;}
  .tcard .nm{font-family:var(--serif);font-size:16px;font-weight:700;margin:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .tcard .sp{font-size:12px;color:var(--muted);margin:2px 0 0;}
  .tcard .ft{font-size:11px;color:var(--muted);margin:6px 0 0;font-style:italic;line-height:1.35;}
  .tcard.open{border:1.5px dashed var(--forest);cursor:pointer;}
  .namecta{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:10.5px;font-weight:800;color:#fff;background:var(--forest);padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .sectlbl{grid-column:1/-1;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:10px 2px 0;}
  .sectlbl.help{color:var(--forest);}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px 0;}

  /* ---- Name Them multi-stage flow ---- */
  .stage{max-width:440px;margin:14px auto 0;}
  .progress{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin:2px 4px 12px;}
  .progress .left{font-weight:700;color:var(--ink);}
  .progress .streak{color:var(--forest);font-weight:800;}
  .crop{position:relative;width:100%;aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#efe9d6,#e3dcc4);box-shadow:var(--shadow);}
  .crop img{width:100%;height:100%;object-fit:cover;display:block;}
  .crop .spchip{position:absolute;top:10px;left:10px;background:rgba(45,35,20,.72);color:#fff;font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;text-transform:capitalize;}
  .crop .seal{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(60,122,78,.86);color:#fff;font-size:64px;opacity:0;pointer-events:none;transition:opacity .2s;}
  .crop.saved .seal{opacity:1;}
  .prompt{font-family:var(--serif);font-size:19px;font-weight:700;text-align:center;margin:16px 0 4px;}
  .promptsub{font-size:13px;color:var(--muted);text-align:center;margin:0 0 14px;}
  .namelist{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:0 0 12px;max-height:34vh;overflow-y:auto;}
  .statuses{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 12px;}
  .statuses .pill{justify-content:flex-start;}
  .statuses .pill .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .newrow{display:flex;gap:8px;margin:8px 0 0;}
  .newrow .search{margin:0;}
  .fade-enter{animation:fadein .22s cubic-bezier(.2,.7,.2,1);}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .lift{animation:lift .32s cubic-bezier(.2,.7,.2,1);}
  @keyframes lift{0%{transform:none}40%{transform:translateY(-6px)}100%{transform:none}}

  /* ---- toast ---- */
  #toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:14px;font-weight:600;padding:11px 18px;border-radius:999px;
    box-shadow:0 8px 24px -8px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:40;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.ok{background:var(--ok);} #toast.err{background:var(--accent);}

  /* ---- quiz ---- */
  .qbar{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin:6px 2px 12px;}
  .qbar b{color:var(--ink);}
  .photo{width:100%;aspect-ratio:4/5;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#efe9d6,#e3dcc4);}
  .photo img{width:100%;height:100%;object-fit:cover;}
  .choices{display:grid;gap:9px;margin-top:12px;}
  .choices button{font:inherit;font-size:16px;font-weight:700;padding:14px;border:1px solid var(--cardborder);border-radius:12px;background:var(--card);color:var(--ink);cursor:pointer;}
  .choices button.correct{background:var(--forest);color:#fff;border-color:var(--forest);}
  .choices button.wrong{background:var(--accent);color:#fff;border-color:var(--accent);}
  .choices button:disabled{opacity:.92;cursor:default;}
  .learn{text-align:center;font-size:14px;color:var(--muted);margin-top:12px;min-height:20px;}
  .big{font-family:var(--serif);font-size:46px;font-weight:800;color:var(--forest);margin:6px 0 2px;text-align:center;}

  /* ---- name board (overlay) ---- */
  .overlay{position:fixed;inset:0;background:rgba(30,24,12,.6);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:18px 14px;overflow-y:auto;}
  .obcard{background:var(--card);border-radius:20px;max-width:460px;width:100%;margin:auto;padding:18px;box-shadow:0 20px 60px -20px rgba(0,0,0,.5);}
  .obclose{position:absolute;top:16px;right:18px;font-size:26px;color:#fff;background:0;border:0;cursor:pointer;}
  .nbphoto{width:120px;height:150px;object-fit:cover;border-radius:14px;margin:0 auto;display:block;}
  .nblist{display:flex;flex-direction:column;gap:7px;margin:12px 0;max-height:44vh;overflow-y:auto;}
  .nbrow{position:relative;overflow:hidden;display:flex;align-items:center;gap:9px;background:rgba(75,107,60,.06);border-radius:11px;padding:8px 11px;}
  .nbbar{position:absolute;left:0;top:0;bottom:0;background:var(--forest);opacity:.14;border-radius:11px 0 0 11px;transition:width .25s;}
  .nbrow>*:not(.nbbar){position:relative;z-index:1;}
  .nbname{flex:1;font-size:15px;font-weight:600;word-break:break-word;}
  .nbvote{font:inherit;font-size:14px;font-weight:800;padding:7px 11px;border:1px solid var(--cardborder);border-radius:9px;background:var(--card);color:var(--forest);cursor:pointer;min-width:52px;}
  .nbvote.on{background:var(--forest);color:#fff;border-color:var(--forest);cursor:default;}
  .nbpct{font-size:12px;font-weight:700;color:var(--muted);min-width:36px;text-align:right;}

  .foot{font-size:11px;color:var(--muted);text-align:center;margin:24px 0 6px;}
  .conn{display:inline-block;width:8px;height:8px;border-radius:50%;background:#c9c2ad;margin-right:5px;vertical-align:middle;}
  .conn.live{background:var(--ok);} .conn.off{background:var(--accent);}
  button:focus-visible,input:focus-visible,.tcard:focus-visible{outline:2px solid var(--forest);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="leaf">🌾</span><h1>Meet the Herd</h1></div>
    <p class="sub" id="sub"><span class="conn" id="conn"></span>Tapestry Acres</p>
  </header>
  <div id="view"></div>
  <p class="foot" id="foot"></p>
</div>

<nav class="tabbar" id="tabbar"></nav>
<div id="toast"></div>

<script>
/* ============================ config + state ============================ */
// The daemon serves this app AND the API on the same origin, but it may be
// mounted under a path prefix by Tailscale serve (e.g. https://host/herd/).
// Tailscale strips that prefix before forwarding, so the app is served at
// "/herd/" while the daemon sees "/". We must therefore send API calls back
// through the SAME prefix the app was loaded under, or they'd hit the wrong
// backend (the sibling service mounted at "/"). Derive the prefix from our own
// path: everything up to the last "/" (drops any trailing index.html).
const BASE = (() => {
  let p = location.pathname.replace(/[^/]*$/, "");   // strip filename -> ".../"
  return p.replace(/\/$/, "");                        // ".../herd" or ""
})();
const API = location.origin + BASE;          // origin + mount prefix
const ADMIN = /[?&]admin=1/.test(location.search);
let HERD = null;                             // herd.json read-model
let TAB = 'herd';

const STATUSES = ["Active","For Sale","Reserved","Breeding","Pregnant","Sold","Deceased"];
const SCOLOR = {"Active":"#4b6b3c","For Sale":"#3f7fa6","Sold":"#8a8478","Reserved":"#e0a23c","Breeding":"#7b5d77","Pregnant":"#c07b9e","Deceased":"#6f6a55"};
const EMOJI = {"alpaca":"🦙","cattle":"🐮","highland cattle":"🐮","cow":"🐮","goat":"🐐","mule":"🐴","horse":"🐴","donkey":"🐴","chicken":"🐔","duck":"🦆","runner duck":"🦆","pig":"🐷","turkey":"🦃","sheep":"🐑"};
const $ = id => document.getElementById(id);
const emoji = sp => EMOJI[(sp||"").toLowerCase()] || "🐾";
const esc = s => { const d=document.createElement('div'); d.textContent=(s==null?'':String(s)); return d.innerHTML; };
const badge = s => `<span class="badge" style="background:${SCOLOR[s]||'#888'}">${esc(s)}</span>`;
const hasPhoto = a => !!(a.photos && a.photos.length);
const primary = a => a.photos && a.photos[0] && a.photos[0].thumb;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const CATTLE=/\b(cattle|cow|galloway|jersey|highland|steer|heifer|bull|calf|bovine)\b/;
function spMatch(a,b){a=(a||'').toLowerCase().trim();b=(b||'').toLowerCase().trim();if(!a||!b)return false;if(a===b)return true;if(CATTLE.test(a)&&CATTLE.test(b))return true;const wb=(h,n)=>new RegExp('\\b'+n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(h);return wb(a,b)||wb(b,a);}
const named = a => !!(a&&a.name) && !a.name_open && !/^\s*(no\s*name|unnamed|unknown|tbd)\s*$/i.test(a.name);

function toast(msg,kind){const t=$('toast');t.textContent=msg;t.className='show'+(kind?' '+kind:'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='',1900);}
function setConn(ok){const c=$('conn');if(c)c.className='conn '+(ok?'live':'off');}
async function api(path,opts){
  const r=await fetch(API+path,Object.assign({cache:'no-store'},opts||{}));
  setConn(true);
  if(!r.ok && r.status>=500) throw new Error('server '+r.status);
  return r.json();
}
function post(path,body){return api(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});}

/* ============================ boot ============================ */
// READONLY = served from a static mirror (GitHub Pages) with no live daemon:
// /healthz 404s there but returns "ok" on the daemon. In READONLY mode the app
// browses + quizzes from the bundled herd.json but every write path is disabled
// (admin tabs never show anyway without ?admin=1; the suggest/vote board is also
// gated so it doesn't POST into the void). The tailnet daemon = full features.
let READONLY = false;
async function probeLive(){
  try{ const r=await fetch(API+'/healthz',{cache:'no-store'}); return r.ok; }catch(e){ return false; }
}
async function boot(){
  READONLY = !(await probeLive());
  try{
    // daemon serves /herd.json live; the mirror ships it as a static file next to index.html
    HERD = await api('/herd.json');
  }catch(e){ setConn(false); HERD = null; }
  renderTabs();
  const t=HERD&&HERD.totals||{};
  $('sub').innerHTML=`<span class="conn ${READONLY?'':'live'}" id="conn"></span>Tapestry Acres · ${t.headcount||0} animals · ${t.named||0} named`;
  const bs=Object.entries((t.by_species)||{}).map(([k,v])=>`${v} ${k.toLowerCase()}`).join(' · ');
  $('foot').textContent=bs?('Herd: '+bs):'';
  setTab('herd');
  if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('sw.js'); }catch(e){} }
}

const TABS = [
  {k:'herd', ic:'🐾', label:'Herd'},
  {k:'quiz', ic:'🎯', label:'Quiz'},
  {k:'name', ic:'✍️', label:'Name Them', admin:true, cnt:d=>d&&d.counts&&d.counts.pending},
  {k:'photos', ic:'📷', label:'Photos', admin:true, cnt:d=>d&&d.counts&&d.counts.gallery},
  {k:'sort', ic:'🗂️', label:'Sort', admin:true, cnt:d=>d&&d.counts&&d.counts.sort},
];
function renderTabs(){
  const bar=$('tabbar');
  bar.innerHTML=TABS.filter(t=>!t.admin||ADMIN).map(t=>{
    const n=t.cnt?t.cnt(HERD):0;
    return `<button data-k="${t.k}" onclick="setTab('${t.k}')" class="${TAB===t.k?'on':''}">
      ${n?`<span class="cnt">${n}</span>`:''}<span class="ic">${t.ic}</span>${esc(t.label)}</button>`;
  }).join('');
}
function setTab(t){
  TAB=t; renderTabs();
  if(t==='herd') renderHerd();
  else if(t==='quiz') startQuiz();
  else if(t==='name') startName();
  else if(t==='photos') startPhotos();
  else if(t==='sort') startSort();
}

/* ============================ HERD (guest) ============================ */
let FILTER='all';
function speciesList(){const c={};(HERD.individuals||[]).forEach(a=>{const s=a.species||'Other';c[s]=(c[s]||0)+1;});return Object.keys(c).sort((x,y)=>c[y]-c[x]).map(s=>({s,n:c[s]}));}
function renderHerd(){
  if(!HERD){ $('view').innerHTML=`<div class="card empty">Can't reach the farm right now.<br>Pull to refresh when you're back online.</div>`; return; }
  const chips=[`<button class="pill chip ${FILTER==='all'?'on':''}" onclick="setFilter('all')">All</button>`]
    .concat(speciesList().map(o=>`<button class="pill chip ${FILTER===o.s?'on':''}" onclick="setFilter('${esc(o.s)}')">${esc(o.s)} ${o.n}</button>`)).join('');
  $('view').innerHTML=`<div class="tools"><input class="search" id="q" placeholder="Search a name…" oninput="drawHerd()"><div class="chips">${chips}</div></div><div class="count" id="cnt"></div><div class="grid" id="grid"></div>`;
  drawHerd();
}
function setFilter(s){const q=(($('q')||{}).value||'');FILTER=s;renderHerd();const i=$('q');if(i&&q){i.value=q;drawHerd();}}
function drawHerd(){
  const q=(($('q')||{}).value||'').toLowerCase().trim();
  let inds=(HERD.individuals||[]).slice();
  if(FILTER!=='all') inds=inds.filter(a=>(a.species||'Other')===FILTER);
  if(q) inds=inds.filter(a=>[a.name,a.species,a.status,(a.features||[]).join(' ')].join(' ').toLowerCase().includes(q));
  const open=inds.filter(a=>a.name_open).sort((a,b)=>hasPhoto(b)-hasPhoto(a));
  inds=inds.filter(a=>!a.name_open).sort((a,b)=>(hasPhoto(b)-hasPhoto(a))||(a.name||'').localeCompare(b.name||''));
  const withP=inds.filter(hasPhoto), noP=inds.filter(a=>!hasPhoto(a));
  let html='';
  if(open.length){ html+=`<div class="sectlbl help">🍼 Help name the herd · tap to suggest</div>`; open.forEach(a=>html+=tileOpen(a)); }
  withP.forEach(a=>html+=tile(a));
  if(noP.length){ html+=`<div class="sectlbl">More of the herd · photos coming soon</div>`; noP.forEach(a=>html+=tile(a)); }
  if(FILTER==='all'){
    const fl=(HERD.flocks||[]).filter(f=>!q||[f.label,f.species,f.status].join(' ').toLowerCase().includes(q));
    if(fl.length){ html+=`<div class="sectlbl">Flocks &amp; groups</div>`; fl.forEach(f=>html+=tileFlock(f)); }
  }
  $('grid').innerHTML=html||`<div class="empty">No matches.</div>`;
  $('cnt').textContent=`${withP.length} with photos · ${withP.length+noP.length+open.length} animals${FILTER==='all'?'':' ('+FILTER+')'}`;
}
function tile(a){
  const np=(a.photos||[]).length, soon=np?'':' soon';
  const inner=np?`<img src="${primary(a)}" alt="${esc(a.name)}" loading="lazy">`+(np>1?`<span class="pcount">📷 ${np}</span>`:''):emoji(a.species);
  const click=np?` onclick="openViewer('${esc(a.id)}')" style="cursor:pointer"`:'';
  return `<div class="tcard${soon}"><div class="ph"${click}>${inner}</div><div class="b"><p class="nm">${esc(a.name)} ${badge(a.status)}</p><p class="sp">${esc(a.species||'')}${a.sex?(' · '+esc(a.sex)):''}</p>${a.features&&a.features.length?`<p class="ft">${esc(a.features.join(' · '))}</p>`:''}</div></div>`;
}
function tileOpen(a){
  const np=(a.photos||[]).length;
  const inner=(np?`<img src="${primary(a)}" alt="" loading="lazy">`:emoji(a.species))+`<span class="namecta">💡 Help name me</span>`;
  return `<div class="tcard open" tabindex="0" onclick="openBoard('${esc(a.id)}')"><div class="ph">${inner}</div><div class="b"><p class="nm">Name this ${esc((a.species||'animal').toLowerCase())}</p><p class="sp">${esc(a.species||'')}${a.sex?(' · '+esc(a.sex)):''} · tap to suggest</p></div></div>`;
}
function tileFlock(f){
  const sp=esc((f.species||'').toLowerCase()), c=f.count;
  const label=(c==null)?`${sp} · flock`:`${c} ${sp}${c===1?'':'s'} · flock`;
  return `<div class="tcard"><div class="ph">${emoji(f.species)}</div><div class="b"><p class="nm">${esc(f.label||f.species)} ${badge(f.status)}</p><p class="sp">${label}</p>${f.notes?`<p class="ft">${esc(f.notes)}</p>`:''}</div></div>`;
}

/* photo viewer */
let VIEW=null;
function openViewer(id){const a=(HERD.individuals||[]).find(x=>x.id===id);if(!a||!(a.photos||[]).length)return;VIEW={a,i:0};renderViewer();}
function renderViewer(){
  let o=$('viewer');
  if(!o){o=document.createElement('div');o.id='viewer';o.className='overlay';o.style.alignItems='center';document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)closeViewer();});}
  const a=VIEW.a,ph=a.photos,src=ph[VIEW.i].thumb;
  o.innerHTML=`<button class="obclose" onclick="closeViewer()">✕</button><div style="text-align:center;color:#fff"><div style="font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:10px">${esc(a.name)}</div><img src="${src}" style="max-width:92vw;max-height:70vh;border-radius:14px" alt="">${ph.length>1?`<div style="margin-top:12px"><button class="btn ghost" onclick="vnav(-1)">‹</button> <span style="color:#fff;margin:0 8px">${VIEW.i+1}/${ph.length}</span> <button class="btn ghost" onclick="vnav(1)">›</button></div>`:''}</div>`;
  o.style.display='flex';
}
function vnav(d){const n=VIEW.a.photos.length;VIEW.i=(VIEW.i+d+n)%n;renderViewer();}
function closeViewer(){const o=$('viewer');if(o)o.style.display='none';VIEW=null;}

/* ============================ NAME suggestions board ============================ */
const SCLIENT='g'+Math.random().toString(36).slice(2);
const VOTED=(()=>{try{return new Set(JSON.parse(localStorage.getItem('herd_voted')||'[]'));}catch(e){return new Set();}})();
function markVoted(sid){if(!sid||VOTED.has(sid))return;VOTED.add(sid);try{localStorage.setItem('herd_voted',JSON.stringify([...VOTED]));}catch(e){}}
let NB=null;
function openBoard(id){const a=(HERD.individuals||[]).find(x=>x.id===id);if(!a)return;NB={id,a,list:(HERD.name_suggestions||{})[id]||[]};renderBoard();}
function renderBoard(){
  let o=$('board');
  if(!o){o=document.createElement('div');o.id='board';o.className='overlay';document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)closeBoard();});}
  const a=NB.a,np=(a.photos||[]).length;
  const img=np?`<img class="nbphoto" src="${primary(a)}" alt="">`:`<div style="font-size:70px;text-align:center">${emoji(a.species)}</div>`;
  const total=NB.list.reduce((t,s)=>t+(s.votes||0),0)||1;
  const rows=NB.list.length?NB.list.map(s=>{
    const voted=VOTED.has(s.sid),pct=Math.round((s.votes||0)/total*100);
    const vbtn=READONLY?`<span class="nbpct">▲ ${s.votes}</span>`:`<button class="nbvote${voted?' on':''}" ${voted?'disabled':''} onclick="nbVote('${esc(s.sid)}')">▲ ${s.votes}</button>`;
    return `<div class="nbrow"><div class="nbbar" style="width:${pct}%"></div>${vbtn}<span class="nbname">${esc(s.name)}</span><span class="nbpct">${pct}%</span></div>`;
  }).join(''):`<div class="empty">${READONLY?'No suggestions yet.':'No suggestions yet — be the first! 🌟'}</div>`;
  const addrow=READONLY?`<div class="nbpct" style="text-align:center;margin-top:10px">Open the herd app on the farm Wi-Fi to suggest &amp; vote.</div>`:`<div class="newrow"><input id="nbin" class="search" placeholder="✚ Suggest a name…" maxlength="40"><button class="btn" onclick="nbSubmit()">Add</button></div>`;
  o.innerHTML=`<button class="obclose" onclick="closeBoard()">✕</button><div class="obcard"><div style="text-align:center">${img}<div style="font-family:var(--serif);font-size:18px;font-weight:800;margin-top:8px">Help name this ${esc((a.species||'animal').toLowerCase())}</div><div style="font-size:13px;color:var(--muted)">${esc(a.species||'')}${a.sex?(' · '+esc(a.sex)):''}</div></div><div class="nblist">${rows}</div>${addrow}</div>`;
  o.style.display='flex';
  const i=$('nbin');if(i)i.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();nbSubmit();}});
}
function nbSubmit(){
  const i=$('nbin');if(!i||!NB)return;const v=(i.value||'').trim();if(!v)return;i.value='';
  post('/suggest',{animal_id:NB.id,name:v}).then(r=>{
    if(r&&r.ok===false){ toast(r.error==='rejected'?"Let's keep names friendly 🙂":r.error==='not-open'?"That animal isn't open for names":"Try again",'err'); }
    if(r&&r.sid) markVoted(r.sid);
    if(r&&r.suggestions){ NB.list=r.suggestions; if(HERD.name_suggestions) HERD.name_suggestions[NB.id]=r.suggestions; renderBoard(); }
  }).catch(()=>toast('Network error','err'));
}
function nbVote(sid){
  if(!NB||VOTED.has(sid))return; markVoted(sid);
  post('/vote',{animal_id:NB.id,sid}).then(r=>{ if(r&&r.suggestions){NB.list=r.suggestions;if(HERD.name_suggestions)HERD.name_suggestions[NB.id]=r.suggestions;renderBoard();} }).catch(()=>toast('Network error','err'));
}
function closeBoard(){const o=$('board');if(o)o.style.display='none';NB=null;}

/* ============================ QUIZ (guest) ============================ */
let quiz=null;
const quizPool=()=>(HERD.individuals||[]).filter(a=>hasPhoto(a)&&named(a));
function startQuiz(){
  const pool=quizPool();
  if(pool.length<4){ $('view').innerHTML=`<div class="card stage" style="text-align:center"><div class="prompt">The quiz unlocks as more animals get photos.</div><div class="big">${pool.length}/4</div><button class="btn block" onclick="setTab('herd')">Browse the herd</button></div>`; return; }
  quiz={deck:shuffle(pool),i:0,score:0,streak:0,best:0,misses:[]};
  renderQuiz();
}
function renderQuiz(){
  if(quiz.i>=quiz.deck.length) return quizEnd();
  const a=quiz.deck[quiz.i],pool=quizPool();
  const same=pool.filter(x=>x.id!==a.id&&spMatch(a.species,x.species)).map(x=>x.name);
  let dis=shuffle(same).slice(0,3).filter(n=>n!==a.name);
  if(dis.length<3){const need=shuffle([...new Set(pool.filter(x=>x.id!==a.id).map(x=>x.name))].filter(n=>n!==a.name&&!dis.includes(n)));dis=dis.concat(need).slice(0,3);}
  const opts=shuffle([...new Set([a.name,...dis])]).slice(0,4);
  $('view').innerHTML=`<div class="stage fade-enter"><div class="qbar"><span>Q <b>${quiz.i+1}</b>/${quiz.deck.length}</span><span>Score <b>${quiz.score}</b>${quiz.streak>1?` · <span style="color:var(--forest);font-weight:800">🔥 ${quiz.streak}</span>`:''}</span></div><div class="card"><div class="photo"><img src="${primary(a)}" alt=""></div><div class="prompt">Who is this ${esc((a.species||'animal').toLowerCase())}?</div><div class="choices" id="ch"></div><div class="learn" id="learn"></div></div></div>`;
  const c=$('ch');let done=false;
  opts.forEach(o=>{const b=document.createElement('button');b.textContent=o;b.onclick=()=>{if(done)return;done=true;const ok=o===a.name;[...c.children].forEach(x=>{x.disabled=true;if(x.textContent===a.name)x.className='correct';});if(!ok)b.className='wrong';if(ok){quiz.score++;quiz.streak++;quiz.best=Math.max(quiz.best,quiz.streak);$('learn').innerHTML=`✓ Yes — that's <b>${esc(a.name)}</b>`;}else{quiz.streak=0;if(!quiz.misses.includes(a))quiz.misses.push(a);$('learn').innerHTML=`This is <b>${esc(a.name)}</b>`;}const nx=document.createElement('button');nx.className='btn block';nx.style.marginTop='12px';nx.textContent=quiz.i+1>=quiz.deck.length?'See results':'Next →';nx.onclick=()=>{quiz.i++;renderQuiz();};c.parentNode.appendChild(nx);};c.appendChild(b);});
}
function quizEnd(){
  $('view').innerHTML=`<div class="stage card" style="text-align:center"><div class="prompt">You knew</div><div class="big">${quiz.score} / ${quiz.deck.length}</div><div class="promptsub">Best streak 🔥 ${quiz.best}</div><div class="promptsub">${quiz.misses.length?('Brush up on: '+quiz.misses.map(m=>esc(m.name)).join(', ')):'Perfect — you know the whole album! 🎉'}</div><button class="btn block" onclick="startQuiz()">Play again</button></div>`;
}

/* ============================ NAME THEM (multi-stage, instant persist) ============================ */
let N={crops:[],i:0,step:'draw',cur:null,name:'',status:'Active',other:false,left:0,done:0,skips:[],busy:false};
function startName(){
  N={crops:[],i:0,step:'draw',cur:null,name:'',status:'Active',other:false,left:0,done:0,skips:[],busy:false};
  $('view').innerHTML=`<div class="stage card" style="text-align:center"><div class="prompt">Loading headshots…</div><div class="big">⏳</div></div>`;
  api('/crops').then(d=>{ N.crops=(d&&d.crops)||[]; N.left=(d&&d.remaining)||N.crops.length; N.i=0; drawCrop(); })
    .catch(()=>{$('view').innerHTML=`<div class="card empty">Naming needs the live farm connection.<br>Open this on the tailnet/Funnel link, not the public mirror.</div>`;});
}
function curCrop(){ while(N.i<N.crops.length && N.skips.includes(N.crops[N.i].cid)) N.i++; return N.crops[N.i]||null; }
function drawCrop(){
  N.step='draw'; N.name=''; N.other=false; N.status='Active';
  const c=curCrop(); N.cur=c;
  if(!c){ $('view').innerHTML=`<div class="stage card" style="text-align:center"><div class="prompt">The whole herd has names! 🎉</div><div class="big">✓ ${N.done}</div><div class="promptsub">${N.done?'You named '+N.done+' this session.':'Nothing left in the queue.'}</div><button class="btn block" onclick="setTab('herd')">Browse the herd</button></div>`; return; }
  renderNameStage();
}
function renderNameStage(){
  const c=N.cur;
  const head=`<div class="progress"><span class="left">${N.left} left${N.done?` · <span class="streak">✓ ${N.done} done</span>`:''}</span><span>${esc(c.species||'')}${c.sex?(' · '+esc(c.sex)):''}</span></div>`;
  const cropImg=`<div class="crop${N.step==='saved'?' saved':''}" id="cropbox"><img src="${c.thumb}" alt=""><span class="spchip">${esc(c.species||'animal')}</span><span class="seal">✓</span></div>`;
  let body='';
  if(N.step==='draw'){
    body=`${cropImg}<div class="prompt">Meet a new face</div><div class="promptsub">Give this ${esc((c.species||'animal').toLowerCase())} a name.</div>
      <button class="btn accent block" onclick="nameBegin()">Name this one</button>
      <div class="btnrow" style="margin-top:10px"><button class="btn ghost" style="flex:1" onclick="nameSkip()">Skip</button>${ADMIN?`<button class="btn ghost" style="flex:1;color:var(--accent)" onclick="nameReject()">✕ Too poor</button>`:''}</div>`;
  } else if(N.step==='name'){
    const spAll=(HERD.individuals||[]).filter(a=>spMatch(c.species,a.species));
    const sameSex=spAll.filter(a=>!c.sex||a.sex===c.sex);
    const showAll=N.other||!sameSex.length;
    const opts=(showAll?spAll:sameSex).map(a=>a.name).sort();
    body=`${cropImg}<div class="prompt">Who is this?</div>
      <div class="namelist">${opts.map(nm=>`<button class="pill" onclick="namePick('${esc(nm).replace(/'/g,"\\'")}')">${esc(nm)}</button>`).join('')||'<span style="color:var(--muted)">No existing names for this species yet.</span>'}</div>
      ${(!showAll&&spAll.length>sameSex.length)?`<button class="btn ghost block" onclick="nameOther()">Not here? Show all ${esc((c.species||'animals').toLowerCase())} ▾</button>`:''}
      <div class="newrow"><input id="newname" class="search" placeholder="✚ New name…" maxlength="40"><button class="btn" onclick="nameNew()">Add</button></div>
      <button class="btn ghost block" style="margin-top:10px" onclick="drawCrop()">← Back</button>`;
  } else if(N.step==='status'){
    body=`${cropImg}<div class="prompt"><b>${esc(N.name)}</b></div><div class="promptsub">What's their status?</div>
      <div class="statuses">${STATUSES.map(s=>`<button class="pill" onclick="nameStatus('${s}')"><span class="dot" style="background:${SCOLOR[s]}"></span>${s}</button>`).join('')}</div>
      <button class="btn ghost block" onclick="nameBegin()">← Back to name</button>`;
  } else if(N.step==='saving'){
    body=`${cropImg}<div class="prompt">Saving <b>${esc(N.name)}</b>…</div><div class="big">⏳</div>`;
  } else if(N.step==='saved'){
    body=`${cropImg}<div class="prompt" style="color:var(--ok)">Saved to the vault ✓</div><div class="promptsub"><b>${esc(N.name)}</b> is now in the herd.</div>`;
  }
  $('view').innerHTML=`<div class="stage fade-enter">${head}${body}</div>`;
  const ni=$('newname'); if(ni) ni.addEventListener('keydown',e=>{if(e.key==='Enter')nameNew();});
}
function nameBegin(){ N.step='name'; renderNameStage(); }
function nameOther(){ N.other=true; renderNameStage(); }
function namePick(nm){ N.name=nm; N.step='status'; renderNameStage(); }
function nameNew(){ const v=($('newname').value||'').trim(); if(v){N.name=v;N.step='status';renderNameStage();} }
function nameSkip(){ if(N.cur) N.skips.push(N.cur.cid); N.i++; drawCrop(); }
function nameStatus(s){
  const c=N.cur; if(!c) return; N.status=s; N.step='saving'; renderNameStage();
  post('/name',{cid:c.cid,name:N.name,status:s}).then(r=>{
    if(r&&r.ok){
      N.done++; N.left=(typeof r.remaining==='number')?r.remaining:Math.max(0,N.left-1);
      N.crops=N.crops.filter(x=>x.cid!==c.cid); // drop the named one locally
      N.step='saved'; renderNameStage();
      const box=$('cropbox'); if(box) box.classList.add('lift');
      renderTabs();
      const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
      setTimeout(()=>drawCrop(), reduce?0:900);
    } else if(r&&r.error==='crop gone'){
      toast('Already named — next one','ok'); N.crops=N.crops.filter(x=>x.cid!==c.cid); N.left=r.remaining||N.left; drawCrop();
    } else { toast((r&&r.error)||'Save failed','err'); N.step='status'; renderNameStage(); }
  }).catch(()=>{ toast("Can't reach the farm — try again",'err'); N.step='status'; renderNameStage(); });
}
function nameReject(){
  const c=N.cur; if(!c) return;
  if(!confirm('Remove this photo from the game? Too poor to name, won\'t be shown again.')) return;
  N.step='saving'; N.name='(removing)'; renderNameStage();
  post('/reject',{cid:c.cid}).then(r=>{
    if(r&&r.ok){ N.left=r.remaining||Math.max(0,N.left-1); N.crops=N.crops.filter(x=>x.cid!==c.cid); toast('Removed','ok'); renderTabs(); drawCrop(); }
    else { toast('Failed','err'); drawCrop(); }
  }).catch(()=>{toast('Network error','err');drawCrop();});
}

/* ============================ PHOTOS (admin) — attach a gallery photo ============================ */
let P={list:[],i:0,other:false,busy:false};
function startPhotos(){
  P={list:[],i:0,other:false,busy:false};
  $('view').innerHTML=`<div class="stage card" style="text-align:center"><div class="prompt">Loading photos…</div><div class="big">⏳</div></div>`;
  api('/gallery').then(d=>{ P.list=(d&&d.photos)||[]; P.i=0; showPhoto(); })
    .catch(()=>{$('view').innerHTML=`<div class="card empty">Filing photos needs the live farm connection.</div>`;});
}
function showPhoto(){
  if(P.i>=P.list.length){ $('view').innerHTML=`<div class="stage card" style="text-align:center"><div class="prompt">${P.list.length?'All filed!':'No photos to file.'}</div><div class="big">🎉</div><button class="btn block" onclick="setTab('herd')">Browse the herd</button></div>`; return; }
  const c=P.list[P.i];
  const all=(HERD.individuals||[]);
  const match=all.filter(a=>spMatch(c.species,a.species));
  const list=(P.other||!match.length)?all.slice():match; list.sort((a,b)=>a.name.localeCompare(b.name));
  const hint=[c.species,(c.colors||[]).join('/'),c.markings].filter(Boolean).join(' · ');
  const guess=c.guess_name?`<button class="btn accent block" onclick="photoPick('${esc(c.guess_id)}')">✓ Looks like ${esc(c.guess_name)}</button>`:'';
  $('view').innerHTML=`<div class="stage fade-enter">
    <div class="progress"><span class="left">Photo ${P.i+1} / ${P.list.length}</span><span>${esc(hint)}</span></div>
    <div class="crop"><img src="${c.url}" alt="" loading="lazy"><span class="spchip">${esc(c.species||'?')}</span></div>
    <div class="prompt">Whose photo is this?</div>${guess}
    <input class="search" id="pq" placeholder="Search a name…" oninput="photoList()" style="margin:10px 0 8px">
    <div class="namelist" id="pch"></div>
    <div class="btnrow" style="margin-top:10px">
      <button class="btn ghost" style="flex:1" onclick="photoOther()">${(P.other||!match.length)?'Showing all':'Show all ▾'}</button>
      <button class="btn ghost" style="flex:1" onclick="photoSkip()">Skip</button></div></div>`;
  window.__plist=list; photoList();
}
function photoList(){
  const q=(($('pq')||{}).value||'').toLowerCase(); const ch=$('pch'); if(!ch)return;
  const items=(window.__plist||[]).filter(a=>a.name.toLowerCase().includes(q)||(a.species||'').toLowerCase().includes(q));
  ch.innerHTML=items.slice(0,40).map(a=>`<button class="pill" onclick="photoPick('${esc(a.id)}')">${esc(a.name)}${a.sex?(' · '+esc(a.sex)):''}</button>`).join('')||'<span style="color:var(--muted)">No matches.</span>';
}
function photoOther(){ P.other=true; showPhoto(); }
function photoSkip(){ P.i++; P.other=false; showPhoto(); }
function photoPick(aid){
  if(P.busy)return; const c=P.list[P.i]; if(!c)return; P.busy=true;
  post('/photo',{pid:c.pid,animal_id:aid,url:c.url}).then(r=>{
    P.busy=false;
    if(r&&r.ok){ toast('Filed ✓','ok'); P.i++; P.other=false; renderTabs(); showPhoto(); }
    else { toast((r&&r.error)||'Failed','err'); }
  }).catch(()=>{P.busy=false;toast('Network error','err');});
}

/* ============================ SORT (admin, read-only v1) ============================ */
function startSort(){
  const n=(HERD&&HERD.counts&&HERD.counts.sort)||0;
  $('view').innerHTML=`<div class="stage card" style="text-align:center"><div class="prompt">Sort photos into pens</div><div class="big">${n?'🗂️':'🎉'}</div><div class="promptsub">${n?n+' photos waiting to be filed.':'Nothing to sort right now.'}</div><div class="promptsub" style="margin-top:8px">Sorting moves files in Drive — that step needs a service-account credential, so it's read-only here for now.</div></div>`;
}

boot();
</script>
